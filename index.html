<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel Streaming</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 15px;
}

h2 {
    text-align: center;
}

form {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
}

input, button {
    padding: 10px;
    border-radius: 8px;
    border: none;
}

input {
    background: #1e293b;
    color: white;
}

button {
    background: #22c55e;
    color: white;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    text-align: center;
}

.activo { background: #14532d; }
.porvencer { background: #78350f; }
.vencido { background: #7f1d1d; }
</style>
</head>

<body>

<h2>📊 Panel Streaming</h2>

<form action="/add" method="POST">
    <input name="nombre" placeholder="Nombre" required>
    <input name="whatsapp" placeholder="WhatsApp">
    <input name="servicio" placeholder="Servicio">
    <input name="inicio" type="date">
    <input name="vence" type="date" required>
    <button type="submit">Guardar</button>
</form>

<table>
<tr>
<th>Nombre</th>
<th>WhatsApp</th>
<th>Servicio</th>
<th>Inicio</th>
<th>Vence</th>
<th>Estado</th>
<th>Eliminar</th>
</tr>

{% for c in clientes %}
<tr class="{{ 'activo' if c.estado=='Activo' else 'porvencer' if c.estado=='Por vencer' else 'vencido' }}">
<td>{{c.nombre}}</td>
<td>{{c.whatsapp}}</td>
<td>{{c.servicio}}</td>
<td>{{c.inicio}}</td>
<td>{{c.vence}}</td>
<td>{{c.estado}}</td>
<td><a href="/delete/{{c.id}}" style="color:white;">❌</a></td>
</tr>
{% endfor %}

</table>

</body>
</html>
